name: Deploy fwqgo

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations on server during deploy"
        required: true
        default: "true"
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: fwqgo-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/fwqgo' }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      KEEP_RELEASES: ${{ vars.KEEP_RELEASES || '5' }}
      KEEP_DB_BACKUPS: ${{ vars.KEEP_DB_BACKUPS || '10' }}
      DB_BACKUP_RETENTION_DAYS: ${{ vars.DB_BACKUP_RETENTION_DAYS || '30' }}
      REMOTE_UPLOAD_DIR: ${{ vars.REMOTE_UPLOAD_DIR || '/var/www/uploads' }}
      RELEASE_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      NEXT_TELEMETRY_DISABLED: "1"
      PUPPETEER_SKIP_DOWNLOAD: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CMS_DATABASE_URL: ${{ secrets.CMS_DATABASE_URL }}
      READ_DATABASE_URL: ${{ secrets.READ_DATABASE_URL }}
      ANALYTICS_DATABASE_URL: ${{ secrets.ANALYTICS_DATABASE_URL }}
      WEB_REVALIDATION_URL: ${{ vars.WEB_REVALIDATION_URL || 'http://127.0.0.1:3000/api/internal/revalidate' }}
      NEXT_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'https://fwqgo.com' }}
      NEXT_PUBLIC_CMS_URL: ${{ vars.NEXT_PUBLIC_CMS_URL || 'https://cms.fwqgo.com' }}
      CMS_BASIC_AUTH_USERNAME: ${{ secrets.CMS_BASIC_AUTH_USERNAME }}
      CMS_BASIC_AUTH_PASSWORD: ${{ secrets.CMS_BASIC_AUTH_PASSWORD }}
      SECRET_ENCRYPTION_KEYS: ${{ secrets.SECRET_ENCRYPTION_KEYS }}
      SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY }}
      SECRET_ENCRYPTION_ACTIVE_KEY_ID: ${{ secrets.SECRET_ENCRYPTION_ACTIVE_KEY_ID || vars.SECRET_ENCRYPTION_ACTIVE_KEY_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Verify architecture boundaries
        run: bun run verify:architecture

      - name: Verify deployment workflow
        run: bun run verify:deploy

      - name: Verify migration manifest
        run: bun run verify:migrations

      - name: Verify security boundaries
        run: bun run verify:security

      - name: Verify public cache boundaries
        run: bun run verify:cache

      - name: Prepare cache revalidation secret
        shell: bash
        run: |
          set -euo pipefail
          secret="${CONFIGURED_WEB_REVALIDATION_SECRET:-}"
          if [[ -z "$secret" ]]; then
            secret="$(openssl rand -hex 32)"
            echo "::notice::WEB_REVALIDATION_SECRET was not configured; generated a deployment-scoped secret and will persist it to the server runtime environment."
          elif (( ${#secret} < 16 )); then
            echo "::error::WEB_REVALIDATION_SECRET must contain at least 16 characters"
            exit 1
          fi
          echo "::add-mask::$secret"
          printf 'WEB_REVALIDATION_SECRET=%s\n' "$secret" >> "$GITHUB_ENV"
        env:
          CONFIGURED_WEB_REVALIDATION_SECRET: ${{ secrets.WEB_REVALIDATION_SECRET }}

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            DEPLOY_HOST
            DEPLOY_USER
            SSH_PRIVATE_KEY
            DATABASE_URL
            CMS_DATABASE_URL
            READ_DATABASE_URL
            ANALYTICS_DATABASE_URL
            CMS_BASIC_AUTH_USERNAME
            CMS_BASIC_AUTH_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required"
              exit 1
            fi
          done
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build standalone
        run: |
          bun run build
          mkdir -p .next-web/standalone/.next-web .next-cms/standalone/.next-cms
          rm -rf .next-web/standalone/.next-web/static .next-web/standalone/public
          rm -rf .next-cms/standalone/.next-cms/static .next-cms/standalone/public
          cp -R .next-web/static .next-web/standalone/.next-web/static
          cp -R .next-cms/static .next-cms/standalone/.next-cms/static
          cp -R public .next-web/standalone/public
          cp -R public .next-cms/standalone/public

      - name: Smoke test built applications
        run: SMOKE_RUNTIME_BIN="$(command -v bun)" bun run smoke:built

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ".deploy/payload-$RELEASE_ID/apps/web" ".deploy/payload-$RELEASE_ID/apps/cms" ".deploy/payload-$RELEASE_ID/scripts" ".deploy/payload-$RELEASE_ID/bin"
          rsync -a .next-web/standalone/ ".deploy/payload-$RELEASE_ID/"
          rsync -a .next-cms/standalone/ ".deploy/payload-$RELEASE_ID/"
          rm -rf ".deploy/payload-$RELEASE_ID/apps/web/.next" ".deploy/payload-$RELEASE_ID/apps/cms/.next"
          ln -sfn "../../.next-web" ".deploy/payload-$RELEASE_ID/apps/web/.next"
          ln -sfn "../../.next-cms" ".deploy/payload-$RELEASE_ID/apps/cms/.next"
          cp -R drizzle ".deploy/payload-$RELEASE_ID/drizzle"
          cp scripts/migrate-prod.mjs ".deploy/payload-$RELEASE_ID/scripts/migrate-prod.mjs"
          cp scripts/migration-manifest.mjs ".deploy/payload-$RELEASE_ID/scripts/migration-manifest.mjs"
          cp scripts/merge-runtime-env.mjs ".deploy/payload-$RELEASE_ID/scripts/merge-runtime-env.mjs"
          cp scripts/secure-db-backup.sh ".deploy/payload-$RELEASE_ID/scripts/secure-db-backup.sh"
          cp scripts/secure-pg-dump.mjs ".deploy/payload-$RELEASE_ID/scripts/secure-pg-dump.mjs"
          cp "$(command -v bun)" ".deploy/payload-$RELEASE_ID/bin/bun"
          chmod 755 ".deploy/payload-$RELEASE_ID/bin/bun"
          mkdir -p ".deploy/payload-$RELEASE_ID/node_modules"
          cp -R node_modules/drizzle-orm node_modules/postgres ".deploy/payload-$RELEASE_ID/node_modules/"
          cp ecosystem.config.cjs ".deploy/payload-$RELEASE_ID/ecosystem.config.cjs"
          cp package.json ".deploy/payload-$RELEASE_ID/package.json"
          tar --format=gnu -czf ".deploy/fwqgo-$RELEASE_ID.tar.gz" -C ".deploy/payload-$RELEASE_ID" .

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/fwqgo_deploy_key
          chmod 600 ~/.ssh/fwqgo_deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Upload release
        shell: bash
        run: |
          set -euo pipefail
          runtime_env=".deploy/runtime-$RELEASE_ID.env"
          umask 077
          printf 'DATABASE_URL=%s\nCMS_DATABASE_URL=%s\nREAD_DATABASE_URL=%s\nANALYTICS_DATABASE_URL=%s\nWEB_REVALIDATION_SECRET=%s\nWEB_REVALIDATION_URL=%s\nSECRET_ENCRYPTION_KEYS=%s\nSECRET_ENCRYPTION_KEY=%s\nSECRET_ENCRYPTION_ACTIVE_KEY_ID=%s\n' \
            "$DATABASE_URL" \
            "$CMS_DATABASE_URL" \
            "$READ_DATABASE_URL" \
            "$ANALYTICS_DATABASE_URL" \
            "$WEB_REVALIDATION_SECRET" \
            "$WEB_REVALIDATION_URL" \
            "$SECRET_ENCRYPTION_KEYS" \
            "$SECRET_ENCRYPTION_KEY" \
            "$SECRET_ENCRYPTION_ACTIVE_KEY_ID" > "$runtime_env"
          scp -P "$DEPLOY_PORT" -i ~/.ssh/fwqgo_deploy_key ".deploy/fwqgo-$RELEASE_ID.tar.gz" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/fwqgo-$RELEASE_ID.tar.gz"
          scp -P "$DEPLOY_PORT" -i ~/.ssh/fwqgo_deploy_key "$runtime_env" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/fwqgo-$RELEASE_ID.runtime.env"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Activate release
        shell: bash
        run: |
          set -euo pipefail
          remote_script="$(mktemp)"
          cat > "$remote_script" <<'REMOTE_SCRIPT'
          set -euo pipefail

          deploy_path="$1"
          release_id="$2"
          remote_artifact="$3"
          keep_releases="$4"
          upload_dir="$5"
          run_migrations="$6"
          runtime_env_override="$7"
          keep_db_backups="$8"
          db_backup_retention_days="$9"

          case "$deploy_path" in
            ""|"/"|"/var"|"/var/www")
              echo "Refusing unsafe DEPLOY_PATH: $deploy_path" >&2
              exit 1
              ;;
          esac

          releases_dir="$deploy_path/releases"
          shared_dir="$deploy_path/shared"
          release_dir="$releases_dir/$release_id"
          current_link="$deploy_path/current"
          previous_release="$(readlink -f "$current_link" 2>/dev/null || true)"
          deployment_stage="prepare release"
          release_link_switched="false"
          processes_replaced="false"

          mkdir -p "$releases_dir" "$shared_dir" "$upload_dir"

          if [[ ! -f "$shared_dir/.env.production" ]]; then
            echo "Missing $shared_dir/.env.production on server." >&2
            exit 1
          fi

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "pm2 is not installed on the server." >&2
            exit 1
          fi

          start_release() {
            local target_release="$1"
            local resolved_release
            local target_release_id
            resolved_release="$(readlink -f "$target_release" 2>/dev/null || printf "%s" "$target_release")"
            target_release_id="${resolved_release##*/}"

            if [[ ! -f "$target_release/ecosystem.config.cjs" ]]; then
              echo "Invalid release: missing ecosystem.config.cjs in $target_release" >&2
              return 1
            fi

            if [[ -f "$target_release/apps/web/server.js" && -f "$target_release/apps/cms/server.js" ]]; then
              if [[ -x "$target_release/bin/bun" ]]; then
                BUN_BIN="$target_release/bin/bun" RELEASE_ID="$target_release_id" WEB_APP_DIR="$target_release/apps/web" CMS_APP_DIR="$target_release/apps/cms" pm2 start "$target_release/ecosystem.config.cjs" --update-env
              else
                RELEASE_ID="$target_release_id" WEB_APP_DIR="$target_release/apps/web" CMS_APP_DIR="$target_release/apps/cms" pm2 start "$target_release/ecosystem.config.cjs" --update-env
              fi
              return
            fi

            if [[ -f "$target_release/.next/standalone/server.js" ]]; then
              RELEASE_ID="$target_release_id" APP_DIR="$target_release/.next/standalone" pm2 start "$target_release/ecosystem.config.cjs" --update-env
              return
            fi

            echo "Invalid standalone release: $target_release" >&2
            return 1
          }

          verify_bun_processes() {
            local expected_bun="$1"
            PM2_RUNTIME_JSON="$(pm2 jlist)" EXPECTED_BUN_BIN="$expected_bun" node - <<'NODE'
          const fs = require("node:fs");

          const expectedBun = fs.realpathSync(process.env.EXPECTED_BUN_BIN);
          const processes = JSON.parse(process.env.PM2_RUNTIME_JSON || "[]");

          for (const name of ["fwqgo-web", "fwqgo-cms"]) {
            const matches = processes.filter((process) => process.name === name);
            if (matches.length !== 1) {
              throw new Error(`${name} expected one Bun process, found ${matches.length}`);
            }

            const environment = matches[0].pm2_env || {};
            const interpreter = environment.exec_interpreter;
            const actualInterpreter = interpreter
              ? fs.realpathSync(interpreter)
              : "";

            if (actualInterpreter !== expectedBun) {
              throw new Error(
                `${name} interpreter is ${interpreter || "missing"}; expected ${expectedBun}`,
              );
            }
            if (environment.exec_mode !== "fork_mode") {
              throw new Error(
                `${name} exec mode is ${environment.exec_mode || "missing"}; expected fork_mode`,
              );
            }
          }
          NODE
          }

          rollback_previous() {
            if [[ -n "$previous_release" && -d "$previous_release" ]]; then
              echo "Activation failed. Rolling back to $previous_release..."
              ln -sfn "$previous_release" "$current_link"
              if [[ "$processes_replaced" == "true" ]]; then
                pm2 delete fwqgo >/dev/null 2>&1 || true
                pm2 delete fwqgo-web >/dev/null 2>&1 || true
                pm2 delete fwqgo-cms >/dev/null 2>&1 || true
                start_release "$previous_release" || true
                pm2 save || true
              else
                echo "PM2 processes were not replaced; keeping the current processes running."
              fi
            fi
          }

          on_deploy_error() {
            status=$?
            trap - ERR
            rm -f "$runtime_env_override"
            echo "Deployment failed during stage: $deployment_stage" >&2
            if [[ "$processes_replaced" == "true" ]]; then
              echo "Recent PM2 logs:"
              pm2 logs fwqgo-web --lines 80 --nostream || true
              pm2 logs fwqgo-cms --lines 80 --nostream || true
            fi
            if [[ "$release_link_switched" == "true" ]]; then
              rollback_previous
            else
              echo "Current release was not switched; no runtime rollback is required."
            fi
            exit "$status"
          }

          trap on_deploy_error ERR

          deployment_stage="unpack release"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          tar -xzf "$remote_artifact" -C "$release_dir"
          ln -sfn "$shared_dir/.env.production" "$release_dir/.env.production"

          [[ -x "$release_dir/bin/bun" ]] || {
            echo "Artifact is missing executable Bun runtime: $release_dir/bin/bun" >&2
            exit 1
          }

          deployment_stage="configure runtime environment"
          "$release_dir/bin/bun" "$release_dir/scripts/merge-runtime-env.mjs" \
            "$shared_dir/.env.production" \
            "$runtime_env_override"
          rm -f "$runtime_env_override"

          [[ -f "$release_dir/apps/web/server.js" && -f "$release_dir/apps/cms/server.js" ]] || {
            echo "Artifact is missing web or cms standalone server.js" >&2
            exit 1
          }

          if [[ "$run_migrations" != "false" ]]; then
            deployment_stage="database backup"
            bash "$release_dir/scripts/secure-db-backup.sh" \
              "$shared_dir/backups/db" \
              "$release_id" \
              "$keep_db_backups" \
              "$db_backup_retention_days" \
              "$shared_dir/.env.production"
            deployment_stage="database migration"
            echo "Running production database migrations on server..."
            "$release_dir/bin/bun" "$release_dir/scripts/migrate-prod.mjs"
          fi

          deployment_stage="switch release"
          ln -sfn "$release_dir" "$current_link"
          release_link_switched="true"

          deployment_stage="restart applications"
          processes_replaced="true"
          if pm2 describe fwqgo >/dev/null 2>&1; then
            pm2 delete fwqgo
          fi
          if pm2 describe fwqgo-web >/dev/null 2>&1; then
            pm2 delete fwqgo-web
          fi
          if pm2 describe fwqgo-cms >/dev/null 2>&1; then
            pm2 delete fwqgo-cms
          fi

          start_release "$current_link"
          verify_bun_processes "$current_link/bin/bun"
          pm2 save

          read_env_value() {
            local key="$1"
            local value
            value="$(grep -E "^${key}=" "$shared_dir/.env.production" 2>/dev/null | tail -n 1 | cut -d= -f2- || true)"
            printf "%s" "$value" | sed -e "s/^[\"']//" -e "s/[\"']$//"
          }

          web_port="$(read_env_value WEB_PORT)"
          cms_port="$(read_env_value CMS_PORT)"
          web_port="${web_port:-3000}"
          cms_port="${cms_port:-3100}"

          wait_for_http_status() {
            local name="$1"
            local url="$2"
            local allowed_pattern="$3"
            local status="000"

            for attempt in $(seq 1 20); do
              status="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || printf "000")"
              if [[ "$status" =~ $allowed_pattern ]]; then
                printf "%s" "$status"
                return 0
              fi
              echo "$name local health check attempt $attempt/20 returned HTTP $status; retrying..." >&2
              sleep 2
            done

            echo "$name local health check failed after retries: HTTP $status" >&2
            return 1
          }

          deployment_stage="local health checks"
          web_status="$(wait_for_http_status "Web" "http://127.0.0.1:${web_port}/api/health" '^200$')"
          cms_status="$(wait_for_http_status "CMS" "http://127.0.0.1:${cms_port}/api/health" '^200$')"
          case "$web_status" in
            200) ;;
            *) echo "Web local health check failed: HTTP $web_status" >&2; exit 1 ;;
          esac
          case "$cms_status" in
            200) ;;
            *) echo "CMS local health check failed: HTTP $cms_status" >&2; exit 1 ;;
          esac
          trap - ERR

          rm -f "$remote_artifact"
          find "$releases_dir" -mindepth 1 -maxdepth 1 -type d | sort -r | tail -n +"$((keep_releases + 1))" | xargs -r rm -rf
          REMOTE_SCRIPT

          ssh -p "$DEPLOY_PORT" -i ~/.ssh/fwqgo_deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s -- '$DEPLOY_PATH' '$RELEASE_ID' '/tmp/fwqgo-$RELEASE_ID.tar.gz' '$KEEP_RELEASES' '$REMOTE_UPLOAD_DIR' '$RUN_MIGRATIONS' '/tmp/fwqgo-$RELEASE_ID.runtime.env' '$KEEP_DB_BACKUPS' '$DB_BACKUP_RETENTION_DAYS'" < "$remote_script"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations != 'false' }}

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          SITE_URL="${NEXT_PUBLIC_URL%/}"
          CMS_URL="${NEXT_PUBLIC_CMS_URL%/}"
          CMS_HOST="$(node -e 'const value = process.env.NEXT_PUBLIC_CMS_URL || "https://cms.fwqgo.com"; const url = new URL(value.includes("://") ? value : `https://${value}`); console.log(url.host);')"
          CURL_RETRY_ARGS=(--retry 3 --retry-delay 2 --retry-connrefused --retry-all-errors)

          probe_http() {
            local label="$1"
            local target="$2"
            shift 2
            local result
            local curl_exit
            local status
            local elapsed
            local redirect

            if result="$(
              curl "${CURL_RETRY_ARGS[@]}" \
                --silent --show-error --head --output /dev/null \
                --write-out '%{http_code}\n%{time_total}\n%{redirect_url}' \
                --max-time 20 "$@" "$target"
            )"; then
              status="$(printf '%s\n' "$result" | sed -n '1p')"
              elapsed="$(printf '%s\n' "$result" | sed -n '2p')"
              redirect="$(printf '%s\n' "$result" | sed -n '3p')"
            else
              curl_exit=$?
              echo "::error::HTTP probe failed. Check: $label URL: $target curl exit: $curl_exit"
              return "$curl_exit"
            fi

            printf 'HTTP probe [%s] url=%s status=%s elapsed=%ss redirect=%s\n' \
              "$label" "$target" "${status:-000}" "${elapsed:-unknown}" "${redirect:-none}" >&2
            printf '%s\n%s\n' "$status" "$redirect"
          }

          redirect_path() {
            node -e 'const value = process.argv[1] || ""; if (!value) process.exit(0); try { const url = new URL(value, "https://placeholder.local"); console.log(url.pathname.replace(/\/+$/, "") || "/"); } catch { process.exit(0); }' "$1"
          }

          redirect_host() {
            node -e 'const value = process.argv[1] || ""; if (!value || !value.includes("://")) process.exit(0); try { console.log(new URL(value).host); } catch { process.exit(0); }' "$1"
          }

          is_cms_login_redirect() {
            local status="$1"
            local redirect="$2"
            local path
            local host
            path="$(redirect_path "$redirect")"
            host="$(redirect_host "$redirect")"
            [[ ( "$status" == "307" || "$status" == "302" ) && "$path" == "/login" && ( -z "$host" || "$host" == "$CMS_HOST" ) ]]
          }

          probe_cms_http() {
            local label="$1"
            local target="$2"
            if [[ -n "${CMS_BASIC_AUTH_USERNAME:-}" && -n "${CMS_BASIC_AUTH_PASSWORD:-}" ]]; then
              probe_http "$label" "$target" -u "$CMS_BASIC_AUTH_USERNAME:$CMS_BASIC_AUTH_PASSWORD"
              return
            fi

            probe_http "$label" "$target"
          }

          homepage_result="$(probe_http "Public homepage" "$SITE_URL/")"
          homepage="$(printf '%s\n' "$homepage_result" | sed -n '1p')"
          [[ "$homepage" == "200" ]] || { echo "::error::Homepage returned $homepage"; exit 1; }

          web_health_result="$(probe_http "Web health endpoint" "$SITE_URL/api/health")"
          web_health="$(printf '%s\n' "$web_health_result" | sed -n '1p')"
          [[ "$web_health" == "200" ]] || { echo "::error::Web health endpoint returned $web_health"; exit 1; }

          cms_health_result="$(probe_cms_http "CMS health endpoint" "$CMS_URL/api/health")"
          cms_health="$(printf '%s\n' "$cms_health_result" | sed -n '1p')"
          [[ "$cms_health" == "200" ]] || { echo "::error::CMS health endpoint returned $cms_health"; exit 1; }

          public_admin_result="$(probe_http "Public admin redirect" "$SITE_URL/ai-rewrite/tasks")"
          public_admin_status="$(printf '%s\n' "$public_admin_result" | sed -n '1p')"
          public_admin_redirect="$(printf '%s\n' "$public_admin_result" | sed -n '2p')"
          public_admin_host="$(redirect_host "$public_admin_redirect")"
          [[ ( "$public_admin_status" == "307" || "$public_admin_status" == "302" ) && "$public_admin_host" == "$CMS_HOST" ]] || {
            echo "::error::Unexpected public admin redirect. Status: $public_admin_status Host: ${public_admin_host:-none}"
            exit 1
          }

          cms_unauth_result="$(probe_http "CMS unauthenticated home" "$CMS_URL/")"
          cms_unauth_status="$(printf '%s\n' "$cms_unauth_result" | sed -n '1p')"
          cms_unauth_redirect="$(printf '%s\n' "$cms_unauth_result" | sed -n '2p')"
          if [[ "$cms_unauth_status" != "401" ]] && ! is_cms_login_redirect "$cms_unauth_status" "$cms_unauth_redirect"; then
            echo "::error::Unexpected CMS unauth response. Status: $cms_unauth_status Redirect: ${cms_unauth_redirect:-none}"
            exit 1
          fi

          cms_home_result="$(probe_cms_http "CMS authenticated home" "$CMS_URL/")"
          cms_home_status="$(printf '%s\n' "$cms_home_result" | sed -n '1p')"
          cms_home_redirect="$(printf '%s\n' "$cms_home_result" | sed -n '2p')"
          cms_home_path="$(redirect_path "$cms_home_redirect")"
          cms_home_host="$(redirect_host "$cms_home_redirect")"
          [[ ( "$cms_home_status" == "307" || "$cms_home_status" == "302" ) && "$cms_home_path" == "/login" && ( -z "$cms_home_host" || "$cms_home_host" == "$CMS_HOST" ) ]] || {
            echo "::error::Unexpected CMS home auth redirect. Status: $cms_home_status Path: ${cms_home_path:-none} Host: ${cms_home_host:-relative}"
            exit 1
          }
